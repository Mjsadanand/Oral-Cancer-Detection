services:
  - type: web
    name: oral-cancer-backend
    runtime: python
    buildCommand: pip install -r requirements-tflite.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
